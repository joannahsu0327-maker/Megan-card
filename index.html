<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鄭涵秦Megan 專業名片 V1</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <script>
        const Megan_DATA = {
            // 請確保此 ID 與 LINE Developers 後台完全一致
            LIFF_ID: "2009703889-CnrKJ3i5", 
            BASE_URL: "https://joannahsu0327-maker.github.io/Megan-card/",
            IMG_MAIN: "Megan_IMAGE.jpg",
            IMG_INTRO: "MeganR_IMAGE.jpg",
            name: "鄭涵秦｜Megan",
            title: "身心整合瑜伽 | 健康生活",
            intro: "修煉穩定內在\n活出優雅氣場",
            feature_Title: "服務項目", 
            item1: "👥 團體課程：全階練習",
            item2: "👤 一對一：量身設計",
            item3: "🎯 小班制：專項突破",
            item4: "🏢 企業包班：職場減壓",
            item5: "💡 主題工作坊：深度覺察",
            url_Booking: "https://lin.ee/RJNJSBd",
            url_FB: "https://www.facebook.com/siddhayoga6188",
            url_IG: "https://www.instagram.com/siddha__yoga",
            phone: "0989194581"
        };

        async function main() {
            try {
                // 初始化 LIFF
                await liff.init({ liffId: Megan_DATA.LIFF_ID });
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                    return; 
                }
                
                // 防止圖片快取的隨機參數
                const ts = "?t=" + Date.now();

                // 啟動分享視窗
                const res = await liff.shareTargetPicker([{
                    "type": "flex", 
                    "altText": "您好，這是 " + Megan_DATA.name + " 的專業名片",
                    "contents": {
                        "type": "carousel",
                        "contents": [
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": Megan_DATA.BASE_URL + Megan_DATA.IMG_MAIN + ts, "size": "full", "aspectRatio": "3:4", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "text", "text": Megan_DATA.name, "weight": "bold", "size": "xl" }, 
                                    { "type": "text", "text": Megan_DATA.title, "size": "sm", "color": "#fb966e", "weight": "bold" } 
                                ] } 
                            },
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": Megan_DATA.BASE_URL + Megan_DATA.IMG_INTRO + ts, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "spacing": "lg", "contents": [
                                    { "type": "text", "text": Megan_DATA.intro, "size": "xs", "color": "#888888", "wrap": true },
                                    { "type": "text", "text": Megan_DATA.feature_Title, "weight": "bold", "size": "lg", "color": "#fb966e" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "text", "text": Megan_DATA.item1, "size": "sm", "weight": "bold" },
                                        { "type": "text", "text": Megan_DATA.item2, "size": "sm", "weight": "bold" },
                                        { "type": "text", "text": Megan_DATA.item3, "size": "sm", "weight": "bold" },
                                        { "type": "text", "text": Megan_DATA.item4, "size": "sm", "weight": "bold" },
                                        { "type": "text", "text": Megan_DATA.item5, "size": "sm", "weight": "bold" }
                                    ]}
                                ]},
                                "footer": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "預約諮詢", "uri": Megan_DATA.url_Booking } } 
                                ] }
                            },
                            { 
                                "type": "bubble", 
                                "body": { "type": "box", "layout": "vertical", "spacing": "md", "contents": [
                                    { "type": "text", "text": "與我聯繫", "weight": "bold", "size": "lg" }, { "type": "separator" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "撥打電話", "uri": "tel:" + Megan_DATA.phone } },
                                        { "type": "button", "style": "secondary", "color": "#EEEEEE", "action": { "type": "uri", "label": "加 LINE 好友", "uri": Megan_DATA.url_Booking } },
                                        { "type": "button", "style": "secondary", "color": "#FEE8F0", "action": { "type": "uri", "label": "Facebook", "uri": Megan_DATA.url_FB } },
                                        { "type": "button", "style": "secondary", "color": "#E8F0FE", "action": { "type": "uri", "label": "Instagram", "uri": Megan_DATA.url_IG } },
                                        { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "📤 分享名片", "uri": "line://app/" + Megan_DATA.LIFF_ID } }
                                    ]}
                                ]}
                            }
                        ]
                    }
                }]);

                if (res) { 
                    liff.closeWindow(); 
                }
            } catch (err) { 
                console.error(err);
                alert("啟動失敗，請檢查權限或網址設定");
            }
        }
        main();
    </script>
</body>
</html>
